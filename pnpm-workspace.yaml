packages:
  - "apps/*"
  - "config/*"
  - "packages/*"

# Don't install packages that are less than 6h old
# This reduces the risk of installing compromised packages.
# In most cases, malicious releases are discovered and removed from the registry
# within an hour.
# see: https://pnpm.io/settings#minimumreleaseage
minimumReleaseAge: 360

minimumReleaseAgeExclude:
  - "@ngrok/remark-mdx-github-alerts"
  - "@ngrok/remark-mdx-no-paragraph-wrap"
  - "@types/react"
  - "@types/react-dom"
  - "react"
  - "react-dom"
  - "typescript"

catalog:
  "@phosphor-icons/react": "2.1.10"
  "@testing-library/dom": "10.4.1"
  "@testing-library/jest-dom": "6.9.1"
  "@testing-library/react": "16.3.2"
  "@types/node": "24.12.4"
  "@tailwindcss/vite": "4.3.0"
  "@vitest/browser-playwright": "4.1.7"
  "happy-dom": "20.9.0"
  "oxc-parser": "0.133.0"
  "playwright": "1.60.0"
  "playwright-core": "1.60.0"
  "@tsdown/css": "0.22.1"
  "tailwindcss": "4.3.0"
  "tsdown": "0.22.0"
  "tsx": "4.22.3"
  "typescript": "6.0.3"
  "@vitejs/plugin-react": "6.0.2"
  "vite": "8.0.14"

overrides:
  "@types/node": "catalog:"
  "@mjackson/node-fetch-server": "npm:@remix-run/node-fetch-server@0.10.0"
  "@vitejs/plugin-react": "catalog:"
  "ajv": ">=8.20.0"
  "cookie": ">=1.1.1"
  "esbuild": ">=0.28.0"
  "playwright": "catalog:"
  "playwright-core": "catalog:"
  "react": "19.2.6"
  "react-dom": "19.2.6"
  "uuid": ">=14.0.0"
    
allowBuilds:
  "esbuild": true
  "@tailwindcss/oxide": true
