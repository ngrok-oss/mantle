name: Build and Push Container (ngrok-mantle / app_3FsBBr2ai9ocPOzjWWaBDBf9Pna)

on:
  push:
    branches: ["**"]
  workflow_dispatch:

env:
  IMAGE_REFERENCE: registry.ship.ngrok.com/ac_1gbcp4ul5rptr9eqgwj21icgsux/app_3fsbbr2ai9ocpozjwwabdbf9pna
  NGROK_APP_ID: app_3FsBBr2ai9ocPOzjWWaBDBf9Pna

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: registry.ship.ngrok.com
          username: creg_3Fpsi82fNgKVILsGzy3HzE5JA28
          password: ${{ secrets.NGROK_REGISTRY_PASSWORD_CREG_3FPSI82FNGKVILSGZY3HZE5JA28 }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REFERENCE }}
          tags: |
            type=sha,format=long,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/www/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}

      - name: Write image reference
        run: |
          cat <<EOF > ngrok-image.json
          {"image":"${{ steps.meta.outputs.tags }}","commit_sha":"${{ github.sha }}"}
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: ngrok-compute-image
          path: ngrok-image.json
