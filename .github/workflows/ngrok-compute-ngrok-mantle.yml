name: Build and Push Container (ngrok-mantle / app_3FrWFXDNsx62q1sOfbtn47DTmaR)

on:
  push:
    branches: ["**"]
  workflow_dispatch:

env:
  IMAGE_REFERENCE: registry.ship.stage-ngrok.com/ac_3clekcpfsaze8fymqpgpzlsxg99/app_3frwfxdnsx62q1sofbtn47dtmar
  NGROK_APP_ID: app_3FrWFXDNsx62q1sOfbtn47DTmaR

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v3
        with:
          registry: registry.ship.stage-ngrok.com
          username: creg_3FrWFYFvDThH5vVQPaVSwhzih1r
          password: ${{ secrets.NGROK_REGISTRY_PASSWORD_CREG_3FRWFYFVDTHH5VVQPAVSWHZIH1R }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REFERENCE }}
          tags: |
            type=sha,format=long,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/www/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}

      - name: Write image reference
        run: |
          cat <<EOF > ngrok-image.json
          {"image":"${{ steps.meta.outputs.tags }}","commit_sha":"${{ github.sha }}"}
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: ngrok-compute-image
          path: ngrok-image.json
