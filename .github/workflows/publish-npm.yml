name: npmjs

on:
  push:
    branches:
      - main

permissions:
  id-token: write # Required for OIDC
  actions: write
  contents: write
  pull-requests: write

env:
  DO_NOT_TRACK: 1
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TELEMETRY_DISABLED: 1
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  VERCEL_TELEMETRY_DISABLED: 1

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'ngrok-oss/mantle'
    steps:
      - uses: actions/create-github-app-token@v2
        id: generate-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v5
        # use version from package.json#packageManager field
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install Dependencies 📥
        run: |
          pnpm install

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm -w changeset:publish
          version: pnpm -w changeset:version
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}

      - name: Post to slack
        if: steps.changesets.outputs.published == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_PUBLISH_WEBHOOK_URL }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          echo "$PUBLISHED_PACKAGES" | jq -c '.[]' | while IFS= read -r pkg; do
            name=$(echo "$pkg" | jq -r '.name')
            version=$(echo "$pkg" | jq -r '.version')
            tag=$(echo "${name}@${version}" | sed 's/@/%40/g; s/\//%2F/g')
            curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"\`${name}@${version}\` published to npm!\nInstall with: \`pnpm add -E ${name}@${version}\`\n<https://github.com/ngrok-oss/mantle/releases/tag/${tag}|Release Notes>\"}" "$SLACK_WEBHOOK_URL"
          done
