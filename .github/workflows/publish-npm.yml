name: npmjs

on:
  push:
    branches:
      - main

# GitHub writes (release PR, tags, releases) use the App token minted in the
# publish job, not the default GITHUB_TOKEN — keep this least-privilege.
permissions:
  contents: read
  id-token: write # Required for OIDC (npm provenance)

env:
  DO_NOT_TRACK: 1
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TELEMETRY_DISABLED: 1
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  VERCEL_TELEMETRY_DISABLED: 1

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'ngrok/mantle'
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: generate-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Install pnpm 📦
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        # use version from package.json#packageManager field
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install Dependencies 📥
        run: |
          pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm -w changeset:publish
          version: pnpm -w changeset:version
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}

      - name: Post to slack
        if: steps.changesets.outputs.published == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_PUBLISH_WEBHOOK_URL }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          echo "$PUBLISHED_PACKAGES" | jq -c '.[]' | while IFS= read -r pkg; do
            name=$(echo "$pkg" | jq -r '.name')
            version=$(echo "$pkg" | jq -r '.version')
            tag=$(echo "${name}@${version}" | sed 's/@/%40/g; s/\//%2F/g')
            curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"\`${name}@${version}\` published to npm!\nInstall with: \`pnpm add -E ${name}@${version}\`\n<https://github.com/ngrok/mantle/releases/tag/${tag}|Release Notes>\"}" "$SLACK_WEBHOOK_URL"
          done
