name: Vibe Check

on:
  push:
  workflow_dispatch:

concurrency:
  group: vibe-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  DO_NOT_TRACK: 1
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TELEMETRY_DISABLED: 1
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  VERCEL_TELEMETRY_DISABLED: 1

jobs:
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install Dependencies 📥
        run: pnpm install --frozen-lockfile

      - name: Format Check 🧹
        run: pnpm run fmt:check

      - name: Lint Check 🔍
        run: pnpm run lint

  mise-lock-check:
    name: Mise Lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install mise 🔧
        run: |
          curl -fsSL https://mise.run | MISE_VERSION="v2026.4.28" sh
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Verify mise.lock is in sync 🔒
        env:
          # `mise lock` refuses to run while settings.locked=true; opt out for
          # this verification step only. We are not modifying the lockfile —
          # we run `mise lock` and require the working tree to remain clean.
          MISE_LOCKED: "0"
        run: |
          mise trust ./mise.toml
          mise lock
          if ! git diff --exit-code mise.lock; then
            echo "::error::mise.lock is out of sync with .nvmrc / package.json#packageManager."
            echo "::error::Run 'mise lock' locally and commit the result."
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install Dependencies 📥
        run: pnpm install --frozen-lockfile

      - name: Build 🏗️
        run: pnpm run build

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install Dependencies 📥
        run: pnpm install --frozen-lockfile

      - name: Typecheck 🔎
        run: pnpm run typecheck

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install Dependencies 📥
        run: pnpm install --frozen-lockfile

      - name: Start Playwright server 🎭
        run: |
          PLAYWRIGHT_VERSION=$(grep '"playwright"' pnpm-workspace.yaml | awk -F'"' '{print $4}')
          docker run -d --name playwright-server --network=host \
            mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-noble \
            /bin/sh -c "npx playwright run-server --host 0.0.0.0 --port 3000"

      - name: Wait for Playwright server
        run: |
          for i in {1..60}; do
            if curl -s http://127.0.0.1:3000/ > /dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "Playwright server did not start in time" && exit 1

      - name: Test 🧪
        env:
          PLAYWRIGHT_WS_ENDPOINT: ws://127.0.0.1:3000/
        run: pnpm run test

      - name: Stop Playwright server
        if: always()
        run: docker rm -f playwright-server || true

  vibe-check:
    name: vibe-check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - static-checks
      - mise-lock-check
      - build
      - typecheck
      - test
    if: ${{ always() }}
    steps:
      - name: Verify all vibe check jobs passed
        env:
          STATIC_CHECKS_RESULT: ${{ needs.static-checks.result }}
          MISE_LOCK_CHECK_RESULT: ${{ needs.mise-lock-check.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          echo "static-checks: $STATIC_CHECKS_RESULT"
          echo "mise-lock-check: $MISE_LOCK_CHECK_RESULT"
          echo "build: $BUILD_RESULT"
          echo "typecheck: $TYPECHECK_RESULT"
          echo "test: $TEST_RESULT"

          if [[ "$STATIC_CHECKS_RESULT" != "success" || \
                "$MISE_LOCK_CHECK_RESULT" != "success" || \
                "$BUILD_RESULT" != "success" || \
                "$TYPECHECK_RESULT" != "success" || \
                "$TEST_RESULT" != "success" ]]; then
            echo "One or more vibe check jobs did not succeed."
            exit 1
          fi
