name: Vibe Check

on:
  push:
  workflow_dispatch:

concurrency:
  group: vibe-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  DO_NOT_TRACK: 1
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TELEMETRY_DISABLED: 1
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  VERCEL_TELEMETRY_DISABLED: 1

jobs:
  vibe-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v4
        # use version from package.json#packageManager field
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install Dependencies 📥
        run: pnpm install

      - name: Start Playwright server 🎭
        run: |
          PLAYWRIGHT_VERSION=$(grep '"playwright"' pnpm-workspace.yaml | awk -F'"' '{print $4}')
          docker run -d --name playwright-server --network=host \
            mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-noble \
            /bin/sh -c "npx playwright run-server --host 0.0.0.0 --port 3000"

      - name: Wait for Playwright server
        run: |
          for i in {1..60}; do
            if curl -s http://127.0.0.1:3000/ > /dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "Playwright server did not start in time" && exit 1

      - name: Format Check 🧹
        run: pnpm run fmt:check

      - name: Lint Check 🔍
        run: pnpm run lint

      - name: Build 🏗️
        run: pnpm run build

      - name: Typecheck 🔎
        run: pnpm run typecheck

      - name: Test 🧪
        env:
          PLAYWRIGHT_WS_ENDPOINT: ws://127.0.0.1:3000/
        run: pnpm run test

      - name: Stop Playwright server
        if: always()
        run: docker rm -f playwright-server || true
