name: Vibe Check

on:
  push:
  workflow_dispatch:

concurrency:
  group: vibe-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DO_NOT_TRACK: 1
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TELEMETRY_DISABLED: 1
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  VERCEL_TELEMETRY_DISABLED: 1

jobs:
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install Dependencies 📥
        run: pnpm install --frozen-lockfile

      - name: Format Check 🧹
        run: pnpm run fmt:check

      - name: Lint Check 🔍
        run: pnpm run lint

  mise-lock-check:
    name: Mise Lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install mise 🔧
        run: |
          ./scripts/install-mise
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Verify mise.lock is in sync 🔒
        run: |
          mise trust ./mise.toml
          mise lock
          if ! git diff --exit-code mise.lock; then
            echo "::error::mise.lock is out of sync with .nvmrc / package.json#packageManager."
            echo "::error::Run 'mise run relock' locally and commit the result."
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install Dependencies 📥
        run: pnpm install --frozen-lockfile

      - name: Build 🏗️
        run: pnpm run build

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install Dependencies 📥
        run: pnpm install --frozen-lockfile

      - name: Typecheck 🔎
        run: pnpm run typecheck

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install Dependencies 📥
        run: pnpm install --frozen-lockfile

      - name: Resolve Playwright version 🔢
        id: playwright
        run: echo "version=$(yq -r '.catalog.playwright' pnpm-workspace.yaml)" >> "${GITHUB_OUTPUT}"

      - name: Cache Playwright browsers 🎭
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          # Key on the Playwright version only, so the cached browser binaries
          # survive unrelated pnpm-workspace.yaml edits and are reused until the
          # next genuine Playwright bump.
          key: playwright-browsers-${{ runner.os }}-${{ steps.playwright.outputs.version }}

      - name: Install Playwright browser 🎭
        # Browsers are downloaded from Playwright's own CDN rather than pulled
        # from MCR, which rate-limits / 401s anonymous public image pulls and
        # made the previous Docker sidecar approach flaky. vitest.config.ts
        # launches Chromium locally when PLAYWRIGHT_WS_ENDPOINT is unset.
        run: pnpm -F @ngrok/mantle exec playwright install --with-deps chromium

      - name: Test 🧪
        run: pnpm run test

  vibe-check:
    name: vibe-check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - static-checks
      - mise-lock-check
      - build
      - typecheck
      - test
    if: ${{ always() }}
    steps:
      - name: Verify all vibe check jobs passed
        env:
          STATIC_CHECKS_RESULT: ${{ needs.static-checks.result }}
          MISE_LOCK_CHECK_RESULT: ${{ needs.mise-lock-check.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          echo "static-checks: $STATIC_CHECKS_RESULT"
          echo "mise-lock-check: $MISE_LOCK_CHECK_RESULT"
          echo "build: $BUILD_RESULT"
          echo "typecheck: $TYPECHECK_RESULT"
          echo "test: $TEST_RESULT"

          if [[ "$STATIC_CHECKS_RESULT" != "success" || \
                "$MISE_LOCK_CHECK_RESULT" != "success" || \
                "$BUILD_RESULT" != "success" || \
                "$TYPECHECK_RESULT" != "success" || \
                "$TEST_RESULT" != "success" ]]; then
            echo "One or more vibe check jobs did not succeed."
            exit 1
          fi
